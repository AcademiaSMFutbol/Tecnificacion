<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Autorizando...</title>
<style>body{background:#0d0f14;color:#4caf50;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px;}
.spin{width:40px;height:40px;border:3px solid #2e7d32;border-top-color:#4caf50;border-radius:50%;animation:s 1s linear infinite;}
@keyframes s{to{transform:rotate(360deg);}}</style>
</head>
<body>
<div class="spin"></div>
<p>Autorizando Drive...</p>
<script>
  const hash = window.location.hash || '';
  const m = hash.match(/access_token=([^&]+)/);
  if (m && window.opener) {
    window.opener.postMessage({ type: 'oauth_token', token: m[1] }, 'https://academiasmfutbol.github.io');
    window.close();
  } else {
    document.querySelector('p').textContent = 'Error: no se recibió token. Cierra esta ventana e inténtalo de nuevo.';
  }
</script>
</body>
</html>
