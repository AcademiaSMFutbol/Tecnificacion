<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Fútbol — Tecnificación</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a3040;
  --accent: #4caf50; --accent2: #47c8ff; --green: #2e7d32;
  --red: #ff4757; --yellow: #ff9800; --text: #e8eaf0; --muted: #6b7280; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; }

/* HEADER */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: stretch; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); display: flex; align-items: center; padding: 14px 0; flex-shrink: 0; }
.logo span { color: var(--text); }
.nav-tabs { display: flex; }
.nav-tab { padding: 16px 18px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; user-select: none; white-space: nowrap; }
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.drive-status { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); cursor: pointer; }
.drive-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.drive-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* PAGES */
.page { display: none; }
.page.active { display: block; }
main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 90px; }

/* SECTION TITLE */
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* FIELDS */
input[type="text"], input[type="date"], textarea, select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; }

/* JUGADORES */
.profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-bottom: 28px; }

/* SUBMIT BAR */
.submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
.btn { padding: 10px 22px; border-radius: 9px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; }
.btn-primary { background: var(--accent); color: #000; }

/* TOAST */
.toast { position: fixed; top: 76px; right: 18px; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 11px 16px; font-size: 13px; z-index: 999; transform: translateX(140%); transition: transform .3s; }
.toast.show { transform: translateX(0); }

/* MODALS */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.76); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; max-width: 520px; width: 92%; max-height: 88vh; overflow-y: auto; }
</style>
</head>
<body>

<header>
  <div class="logo">SM <span>FÚTBOL</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showPage('nueva')">NUEVA SESIÓN</div>
    <div class="nav-tab" onclick="showPage('historial')">HISTORIAL</div>
    <div class="nav-tab" onclick="showPage('jugadores')">JUGADORES</div>
  </div>
  <div class="header-right">
    <div class="drive-status" onclick="openModal('driveModal')">
      <div id="driveDot" class="drive-dot"></div>
      <span id="driveLabel">Drive Desconectado</span>
    </div>
  </div>
</header>

<main>
  <div id="page-nueva" class="page active">
    <h2 class="section-title">Nueva Sesión</h2>
    <p style="color:var(--muted)">Inicia una nueva sesión de entrenamiento.</p>
  </div>

  <div id="page-historial" class="page">
    <h2 class="section-title">Historial de Sesiones</h2>
    <div id="sessionList" style="text-align:center; padding:40px; color:var(--muted)">No hay sesiones registradas.</div>
  </div>

  <div id="page-jugadores" class="page">
    <h2 class="section-title">Gestión de Jugadores</h2>
    <div id="profilesGrid" class="profiles-grid"></div>
    <button class="btn btn-primary" onclick="openModal('addPlayerModal')">+ Añadir Jugador</button>
  </div>
</main>

<div id="driveModal" class="modal-backdrop">
  <div class="modal">
    <h2>Google Drive</h2>
    <p>Conecta tu cuenta para sincronizar fotos en la carpeta <strong>"SM FÚTBOL - FOTOS"</strong>.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('driveModal')">Cerrar</button>
      <button class="btn btn-primary" onclick="handleAuthClick()">Conectar Google Drive</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ════════════════════════════════════════════════
// CONFIGURACIÓN Y DATOS (LIMPIOS)
// ════════════════════════════════════════════════
const INITIAL_PLAYERS = [];
const INITIAL_SESSIONS = [];
const FOLDER_NAME = "SM FÚTBOL - FOTOS";

const LS = {
  PLAYERS: 'sm_futbol_jugadores',
  SESSIONS: 'sm_futbol_historial',
  PHOTOS: 'sm_futbol_fotos'
};

let jugadores = JSON.parse(localStorage.getItem(LS.PLAYERS)) || INITIAL_PLAYERS;
let historial = JSON.parse(localStorage.getItem(LS.SESSIONS)) || INITIAL_SESSIONS;
let accessToken = null;

// ════════════════════════════════════════════════
// LÓGICA DE DRIVE: CARPETA ESPECÍFICA
// ════════════════════════════════════════════════

async function getOrCreatePhotosFolder() {
  try {
    // Buscar la carpeta por nombre
    const searchResp = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${encodeURIComponent(FOLDER_NAME)}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const searchData = await searchResp.json();

    if (searchData.files && searchData.files.length > 0) {
      return searchData.files[0].id; // Retorna el ID si ya existe
    }

    // Crear la carpeta si no existe
    const createResp = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        name: FOLDER_NAME,
        mimeType: 'application/vnd.google-apps.folder'
      })
    });
    const newFolder = await createResp.json();
    return newFolder.id;
  } catch (err) {
    console.error("Error en Drive:", err);
    return null;
  }
}

async function uploadPhotoToDrive(playerName, base64Data) {
  if (!accessToken) return;

  const folderId = await getOrCreatePhotosFolder();
  if (!folderId) return;

  const mimeType = base64Data.split(',')[0].split(':')[1].split(';')[0];
  const bytes = atob(base64Data.split(',')[1]);
  const arr = new Uint8Array(bytes.length);
  for (let i=0; i<bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  
  const metadata = {
    name: `${playerName}.jpg`,
    parents: [folderId]
  };

  const formData = new FormData();
  formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  formData.append('file', new Blob([arr], { type: mimeType }));

  try {
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}` },
      body: formData
    });
    showToast(`Foto de ${playerName} guardada en Drive`, 'success');
  } catch (e) {
    showToast("Error al subir foto", "error");
  }
}

// ════════════════════════════════════════════════
// UTILIDADES DE UI
// ════════════════════════════════════════════════

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${pageId}`).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Autenticación simplificada para Drive
function handleAuthClick() {
  // Aquí iría la lógica de inicio de sesión de Google Identity
  accessToken = "TOKEN_SIMULADO"; 
  document.getElementById('driveDot').classList.add('connected');
  document.getElementById('driveLabel').textContent = "Conectado a Drive";
  showToast("Conectado correctamente", "success");
  closeModal('driveModal');
}

console.log("Sistema SM Fútbol inicializado.");
</script>
</body>
</html>
